name: Regression Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verify environment
        run: |
          python --version
          pip --version
          google-chrome --version || chromium-browser --version || echo "Chrome not found on PATH"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify test collection
        run: pytest --collect-only -q

      - name: Run smoke tests
        run: pytest -m smoke -v --html=reports/smoke-report.html --self-contained-html

      - name: Run full regression suite
        run: pytest -v --html=reports/regression-report.html --self-contained-html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/
          retention-days: 14